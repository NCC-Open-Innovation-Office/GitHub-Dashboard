<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Org Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body { background: #0f172a; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sort-arrow::after { content: '↕'; opacity: 0.3; margin-left: 4px; }
    .sort-asc::after  { content: '↑'; opacity: 1; margin-left: 4px; }
    .sort-desc::after { content: '↓'; opacity: 1; margin-left: 4px; }
    .tv-mode { background: radial-gradient(circle at 20% 20%, #1e293b 0%, #020617 65%); }
    .tv-mode #page-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .tv-mode #tv-frame {
      width: min(calc(100vw - 2rem), calc((100vh - 2rem) * 16 / 9));
      height: min(calc(100vh - 2rem), calc((100vw - 2rem) * 9 / 16));
      border: 1px solid #334155;
      border-radius: 14px;
      background: #0f172a;
      box-shadow: 0 24px 60px rgba(2, 6, 23, 0.5);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tv-mode nav { position: static; }
    .tv-mode footer { display: none; }
    .tv-mode #org-header-section { display: none; }
    .tv-mode #dashboard-main {
      max-width: none;
      flex: 1;
      width: 100%;
      padding: 1rem;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 1rem;
      overflow: hidden;
    }
    .tv-mode #stats-section { grid-column: 1 / span 2; grid-row: 1; }
    .tv-mode #commit-section { grid-column: 1; grid-row: 2; }
    .tv-mode #repos-section { grid-column: 1; grid-row: 3; min-height: 0; }
    .tv-mode #contributors-section { grid-column: 2; grid-row: 2; }
    .tv-mode #activity-section { grid-column: 2; grid-row: 3; min-height: 0; }
    .tv-mode .tv-scroll { min-height: 0; overflow: auto; }
    .tv-mode .tv-focus {
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.35), 0 12px 30px rgba(15, 23, 42, 0.6);
      border-color: rgba(99, 102, 241, 0.8);
    }
  </style>
</head>
<body class="dark min-h-screen text-slate-100">

  <div id="page-shell">
  <div id="tv-frame">

  <!-- ── Nav ── -->
  <nav class="sticky top-0 z-10 border-b border-slate-700 bg-slate-900/95 backdrop-blur-sm">
    <div class="mx-auto flex max-w-screen-2xl items-center justify-between px-6 py-3">
      <div class="flex items-center gap-2 text-slate-300 font-semibold">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        <span>Org Dashboard</span>
        <span id="nav-org-name" class="text-slate-500 font-normal"></span>
      </div>
      <div class="flex items-center gap-3">
        <span id="tv-focus-indicator" class="hidden rounded-md border border-indigo-700/70 bg-indigo-950/40 px-2 py-1 text-xs font-medium uppercase tracking-wider text-indigo-300"></span>
      </div>
    </div>
  </nav>

  <main id="dashboard-main" class="mx-auto max-w-screen-2xl space-y-5 px-6 py-6">

    <!-- Org Header -->
    <div id="org-header-section"></div>

    <!-- Stats Grid -->
    <div id="stats-section">
      <div id="stats-grid" class="grid grid-cols-2 gap-4 sm:grid-cols-3 xl:grid-cols-6"></div>
    </div>

    <!-- Commit Activity -->
    <div id="commit-section" class="rounded-xl border border-slate-700 bg-slate-800/60 p-5">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Commit Activity — Last 26 Weeks</h2>
      </div>
      <div id="commit-activity-content"><div class="loader py-12"></div></div>
    </div>

    <!-- Repos + Contributors -->
    <div class="contents xl:grid xl:grid-cols-3 xl:gap-5">

      <!-- Repo Table -->
      <div id="repos-section" class="xl:col-span-2 rounded-xl border border-slate-700 bg-slate-800/60 p-5">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Repositories</h2>
        </div>
        <!-- Toolbar -->
        <div class="mb-3 flex flex-wrap items-center gap-3">
          <input id="repo-search" type="text" placeholder="Search repositories…"
            class="flex-1 min-w-48 rounded-lg border border-slate-600 bg-slate-700 px-3 py-1.5 text-sm text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
          <div id="repo-filter-btns" class="flex flex-wrap gap-2"></div>
        </div>
        <div id="repos-table-wrapper" class="tv-scroll"><div class="loader py-12"></div></div>
        <p id="repo-count-label" class="mt-2 text-xs text-slate-500"></p>
        <div id="repo-more-controls" class="mt-2 flex items-center gap-2"></div>
      </div>

      <!-- Contributors -->
      <div id="contributors-section" class="rounded-xl border border-slate-700 bg-slate-800/60 p-5">
        <div class="mb-4 flex items-center justify-between">
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Top Contributors</h2>
        </div>
        <div id="contributors-content"><div class="loader py-12"></div></div>
      </div>
    </div>

    <!-- Activity Feed -->
    <div id="activity-section" class="rounded-xl border border-slate-700 bg-slate-800/60 p-5 tv-scroll">
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Recent Activity</h2>
      </div>
      <div id="activity-content"><div class="loader py-12"></div></div>
    </div>

  </main>

  <footer class="border-t border-slate-700 bg-slate-900/90 px-6 py-4 text-center text-sm text-slate-400">
    Powered by the
    <a
      href="https://github.com/NCC-Open-Innovation-Office"
      target="_blank"
      rel="noopener noreferrer"
      class="font-medium text-indigo-400 hover:text-indigo-300"
    >Open Innovation Office</a>
    at Northampton Community College
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="/static/js/app.js?v=20260616a"></script>

  </div>
  </div>
</body>
</html>
