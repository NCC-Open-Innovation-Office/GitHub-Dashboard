services:
  app:
    build: ./backend
    env_file: .env
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app   # hot-reload: code + static files (matches Dockerfile WORKDIR)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
